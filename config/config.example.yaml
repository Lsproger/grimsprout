# Active environment profile: local | prod
# Override without editing this file: GRIMSPROUT_ENV=prod python -m grimsprout
env: local

telegram:
  bootstrap_admin_tg_id: 123456789  # <-- замени на свой Telegram ID
  parse_mode: "HTML"
  local:
    token_env: "BOT_TOKEN_DEV"      # dev-бот токен в .env
  prod:
    token_env: "BOT_TOKEN"          # prod-бот токен в .env

repository:
  # Shared across all environments
  images_dir: "images"
  template_file: "_template.md"
  git_remote: "origin"
  git_branch: "master"           # base branch; bot never writes to it directly
  work_branch: "grimsprout/auto"  # bot-only branch; all auto-commits land here
  clone_dir: "var/repo"           # relative to project root; used when path is a URL
  local:
    path: "var/repo/trava"        # local checkout — no clone on startup
    github_trava_token_env: "GIT_TRAVA_TOKEN"
    confirm_commits: true         # ask before every auto-commit in dev
  prod:
    path: "https://github.com/yourname/trava.git"  # cloned on startup
    github_trava_token_env: "GIT_TRAVA_TOKEN"
    confirm_commits: true

mongo:
  local:
    uri_env: "MONGO_URI"
    database: "grimsprout_dev"
  prod:
    uri_env: "MONGO_URI"
    database: "grimsprout"

llm:
  # Shared across all environments
  provider: "ollama"
  temperature: 1.0
  top_p: 0.95
  top_k: 64
  timeout_sec: 30
  system_prompt_file: "config/prompts/system_undertaker.md"
  intent_schema_file: "config/prompts/intent_schema.json"
  confidence_threshold: 0.5       # observe/query/unknown
  mutate_confidence_threshold: 0.75 # water/fertilize/repot
  conversation_history_max_turns: 5   # keep last 5 user+assistant pairs in context
  conversation_ttl_minutes: 30        # discard history after 30 min of inactivity
  show_perf_stats: true
  local:
    base_url: "http://localhost:11434"
    model: "llama3"
  prod:
    base_url: "http://ollama.yourdomain.com:11434"
    model: "llama3"

scheduling:
  timezone: "Europe/Warsaw"
  default_snooze_days: 1

logging:
  local:
    level: "DEBUG"
    json: false
  prod:
    level: "INFO"
    json: false
