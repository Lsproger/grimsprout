# Active environment profile: local | prod
# Override without editing this file: GRIMSPROUT_ENV=prod python -m grimsprout
env: local

telegram:
  parse_mode: "HTML"
  local:
    token_env: "DEV_BOT_TOKEN"
    bootstrap_admin_tg_id: 247985454
  prod:
    token_env: "BOT_TOKEN"
    bootstrap_admin_tg_id: 247985454


repository:
  # Shared across all environments
  images_dir: "images"
  template_file: "_template.md"
  git_remote: "origin"
  git_branch: "master"           # base branch; bot never writes to it directly
  clone_dir: "var/repo"           # relative to project root; used when path is a URL
  path: "https://github.com/Lsproger/trava.git"  # cloned on startup
  https_token_env: "GIT_HTTPS_TOKEN"
  github_token_env: "GITHUB_TOKEN"
  local:
    work_branch: "grimsprout-dev/auto"  
  prod:
    work_branch: "grimsprout/auto"  


mongo:
  local:
    uri_env: "MONGO_DEV_URI"
    database: "grimsprout_dev"
  prod:
    uri_env: "MONGO_URI"
    database: "grimsprout"

llm:
  # Shared across all environments
  provider: "ollama"
  temperature: 0.1
  timeout_sec: 30
  system_prompt_file: "config/prompts/system_undertaker.md"
  intent_schema_file: "config/prompts/intent_schema.json"
  local:
    base_url: "http://openwebui.lab.kekpuk.top:11434"
    model: "gemma3:4b"
  prod:
    base_url: "http://openwebui.lab.kekpuk.top:11434"
    model: "gemma3:4b"

scheduling:
  timezone: "Europe/Warsaw"
  default_snooze_days: 1

logging:
  local:
    level: "DEBUG"
    json: false
  prod:
    level: "INFO"
    json: false
