telegram:
  token_env: "BOT_TOKEN"
  bootstrap_admin_tg_id: 123456789   # <-- замени на свой Telegram ID
  parse_mode: "HTML"

repository:
  path: "/Users/Yury_Mikhnavets/projects/personal/trava"
  images_dir: "images"
  template_file: "_template.md"
  git_remote: "origin"
  git_branch: "master"

mongo:
  uri_env: "MONGO_URI"
  database: "grimsprout"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "llama3"
  temperature: 0.1
  timeout_sec: 30
  system_prompt_file: "config/prompts/system_undertaker.md"
  intent_schema_file: "config/prompts/intent_schema.json"

scheduling:
  timezone: "Europe/Warsaw"
  default_snooze_days: 1

logging:
  level: "INFO"
  json: false
