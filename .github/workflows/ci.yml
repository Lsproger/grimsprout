name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install ruff
        run: pip install "ruff>=0.5"

      - name: Run ruff
        run: ruff check src tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep -q 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      MONGO_TEST_URI: mongodb://localhost:27017

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/localhost/27017) 2>/dev/null; then
              echo "Mongo is up"; exit 0
            fi
            sleep 1
          done
          echo "Mongo did not become ready in time" >&2
          exit 1

      - name: Run tests with coverage
        run: |
          pytest -q \
            --cov=grimsprout \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=75

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  build-and-push:
    name: Build & Push Docker image
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/lsproger/grimsprout:latest
            ghcr.io/lsproger/grimsprout:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
